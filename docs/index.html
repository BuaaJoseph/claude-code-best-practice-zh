<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code 最佳实践</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root { --theme-color: #667eea; }
    .markdown-section h1 { color: var(--theme-color); border-bottom: 2px solid var(--theme-color); padding-bottom: 10px; }
    .sidebar-nav > a { color: #333 !important; text-decoration: none; }
    .sidebar-nav > a:hover { color: var(--theme-color) !important; }
  </style>
</head>
<body>
  <div id="app">正在加载...</div>
  <script>
    window.$docsify = {
      name: 'Claude Code 最佳实践',
      repo: 'https://github.com/BuaaJoseph/claude-code-best-practice-zh',
      loadSidebar: '_sidebar.md',
      homepage: 'README.md',
      subMaxLevel: 2,
      auto2top: true,
      search: { maxAge: 86400000, paths: 'auto', placeholder: '🔍 搜索' }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-search/dist/docsify-search.min.js"></script>
</body>
</html>
